<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
        <div class="auth-box">
            <input type="text" id="username" placeholder="Όνομα χρήστη">
            <button onclick="login()">Σύνδεση</button>
        </div>
        <button onclick="logout()">Αποσύνδεση</button>
    </div>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66" class="library-img">
        <h1>📚 Smart Library 📚</h1>

        <section id="admin-area">
            <h2>Προσθήκη Βιβλίου</h2>
            <form id="bookform">
                <input type="text" id="title" placeholder="Τίτλος" required>
                <input type="text" id="author" placeholder="Συγγραφέας" required>
                <input type="number" id="year" placeholder="Έτος" required>
                <button type="submit">Προσθήκη</button>
            </form>
        </section>

        <section class="books-list">
            <h2>Η Συλλογή μου</h2>
            <table>
                <thead>
                    <tr>
                        <th>Τίτλος</th>
                        <th>Συγγραφέας</th>
                        <th>Έτος</th>
                        <th>Ενέργειες</th>
                    </tr>
                </thead>
                <tbody id="bookList"></tbody>
            </table>
        </section>
    </div>

<script>
// Σύνδεση Χρήστη
async function login() {
    const username = document.getElementById("username").value;

    await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username })
    });

    checkAuth();
}

// Έλεγχος αν ο χρήστης είναι συνδεδεμένος (Ασφαλής έκδοση)
async function checkAuth() {
    const res = await fetch("/check-auth");
    const data = await res.json();

    const authContainer = document.getElementById("auth-container");
    const library = document.getElementById("library");
    const userDisplay = document.getElementById("user-display");

    if (data.authenticated) {
        if (authContainer) authContainer.style.display = "none";
        if (library) library.style.display = "block";
        if (userDisplay) userDisplay.innerText = "Καλώς ήρθες " + data.username;
        loadBooks();
    } else {
        if (authContainer) authContainer.style.display = "flex";
        if (library) library.style.display = "block";
    }
}

// Φόρτωση Βιβλίων
async function loadBooks() {
    const res = await fetch("/books");
    const books = await res.json();

    const bookList = document.getElementById("bookList");
    if (bookList) {
        bookList.innerHTML = books.map(b => `
            <tr>
                <td>${b.title}</td>
                <td>${b.author}</td>
                <td>${b.year}</td>
                <td>🗑️</td>
            </tr>
        `).join('');
    }
}

// Προσθήκη Βιβλίου
const bookForm = document.getElementById("bookform");
if (bookForm) {
    bookForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        await fetch("/books", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                title: document.getElementById("title").value,
                author: document.getElementById("author").value,
                year: document.getElementById("year").value
            })
        });

        loadBooks();
    });
}

// Αποσύνδεση
async function logout() {
    try {
        const res = await fetch("/logout"); // Καλεί το route στο app.js
        if (res.ok) {
            location.reload(); // Φρεσκάρει τη σελίδα και σε βγάζει στην αρχική κατάσταση (Login)
        }
    } catch (err) {
        console.error("Σφάλμα κατά το logout:", err);
    }
}
// Αρχική εκτέλεση
checkAuth();
loadBooks(); // Τρέχει πάντα για να φαίνονται τα δημόσια βιβλία
</script>

</body>
</html>
