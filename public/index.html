<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Η Βιβλιοθήκη μου</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        img { max-width: 500px; border-radius: 10px; margin: 20px 0; }
        #auth-container { margin: 20px; }
        #library { margin-top: 30px; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; }
        td, th { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>

    <h1>Η Ψηφιακή μου Βιβλιοθήκη</h1>
    <img src="https://www.lifo.gr/sites/default/files/styles/lifo_large/public/2020-04/books-1281581_1920.jpg" alt="Βιβλία">

    <div id="auth-container">
        <input type="text" id="username" placeholder="Όνομα Χρήστη">
        <button onclick="login()">Σύνδεση</button>
    </div>

    <div id="library" style="display: none;">
        <h2 id="user-display"></h2>
        <button onclick="logout()">Αποσύνδεση</button>

        <h3>Προσθήκη νέου βιβλίου</h3>
        <form id="bookform">
            <input type="text" id="title" placeholder="Τίτλος" required>
            <input type="text" id="author" placeholder="Συγγραφέας" required>
            <input type="number" id="year" placeholder="Έτος" required>
            <button type="submit">Προσθήκη</button>
        </form>

        <table>
            <thead><tr><th>Τίτλος</th><th>Συγγραφέας</th><th>Έτος</th></tr></thead>
            <tbody id="bookList"></tbody>
        </table>
    </div>

    <script>
        // Εδώ μπαίνει το script που φτιάξαμε προηγουμένως (login, checkAuth, loadBooks, logout)
        async function login() {
            const username = document.getElementById("username").value;
            await fetch("/login", { 
                method: "POST", 
                headers: {"Content-Type": "application/json"}, 
                body: JSON.stringify({ username }) 
            });
            checkAuth();
        }

        async function checkAuth() {
            const res = await fetch("/check-auth");
            const data = await res.json();
            document.getElementById("auth-container").style.display = data.authenticated ? "none" : "block";
            document.getElementById("library").style.display = data.authenticated ? "block" : "none";
            if (data.authenticated) {
                document.getElementById("user-display").innerText = "Καλώς ήρθες " + data.username;
                loadBooks();
            }
        }

        async function loadBooks() {
            const res = await fetch("/books");
            const books = await res.json();
            document.getElementById("bookList").innerHTML = books.map(b => `
                <tr><td>${b.title}</td><td>${b.author}</td><td>${b.year}</td></tr>
            `).join('');
        }

        document.getElementById("bookform").addEventListener("submit", async (e) => {
            e.preventDefault();
            await fetch("/books", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    title: document.getElementById("title").value,
                    author: document.getElementById("author").value,
                    year: document.getElementById("year").value
                })
            });
            loadBooks();
        });

        async function logout() {
            await fetch("/logout");
            location.reload();
        }

        checkAuth();
    </script>
</body>
</html>
