<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Smart Library</title>
</head>
<body>

<div id="auth-container">
    <input type="text" id="username" placeholder="Username">
    <button onclick="login()">Σύνδεση</button>
</div>

<div id="library" style="display:none;">
    <h2 id="user-display"></h2>
    <button onclick="logout()">Αποσύνδεση</button>
    <form id="bookform">
        <input type="text" id="title" placeholder="Τίτλος" required>
        <input type="text" id="author" placeholder="Συγγραφέας" required>
        <button type="submit">Προσθήκη</button>
    </form>
    <ul id="bookList"></ul>
</div>

<script>
    async function login() {
        const username = document.getElementById("username").value;
        await fetch("/login", { 
            method: "POST", 
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username}) 
        });
        location.reload();
    }

    async function checkAuth() {
        const res = await fetch("/check-auth");
        const data = await res.json();
        if (data.authenticated) {
            document.getElementById("auth-container").style.display = "none";
            document.getElementById("library").style.display = "block";
            document.getElementById("user-display").innerText = "Καλώς ήρθες " + data.username;
            loadBooks();
        }
    }

    async function loadBooks() {
        const res = await fetch("/books");
        const books = await res.json();
        document.getElementById("bookList").innerHTML = books.map(b => `<li>${b.title} από ${b.author}</li>`).join('');
    }

    document.getElementById("bookform").addEventListener("submit", async (e) => {
        e.preventDefault();
        await fetch("/books", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                title: document.getElementById("title").value,
                author: document.getElementById("author").value
            })
        });
        loadBooks();
    });

    async function logout() {
        await fetch("/logout");
        location.reload();
    }

    checkAuth();
</script>
</body>
</html>
